---
- name: Manage WLAN on Cisco Catalyst 9800 WLC (fully dynamic)
  hosts: all
  gather_facts: false
  connection: network_cli

  vars_prompt:
    - name: "username"
      prompt: "Enter the SSH username"
    - name: "password"
      prompt: "Enter the SSH password"
      private: yes

  # "ssid" is the string we'll look for in "show wlan summary" to identify the row
  vars:
    ssid: "WHS_Guest"
    mobility_anchors:
      - { action: "delete", ip: "162.41.34.21" }
      - { action: "add",    ip: "162.41.34.23" }

  tasks:
    - name: Fetch WLAN summary
      cisco.ios.ios_command:
        commands:
          - "show wlan summary"
      register: wlan_summary_output

    - name: Find the line containing our SSID
      # We'll store the entire line that has "WHS_Guest" in it (or whatever your 'ssid' var is).
      set_fact:
        relevant_line: >-
          {% for line in wlan_summary_output.stdout[0].split('\n') %}
          {% if ssid in line %}
          {{ line }}
          {% endif %}
          {% endfor %}
    
    - name: Fail if we can't find a matching line
      fail:
        msg: "Could not find SSID '{{ ssid }}' in 'show wlan summary' output on {{ inventory_hostname }}."
      when: relevant_line is undefined or relevant_line == ""

    - name: Parse the WLAN ID and Policy Profile from the relevant line
      set_fact:
        wlan_id:        "{{ relevant_line.split()[0] }}"  # yields "22"
        policy_profile: "{{ relevant_line.split()[1] }}"  # yields "WHS_Guest"
        parsed_SSID:    "{{ relevant_line.split()[2] }}"  # yields "WHS_Guest"

    - name: Debug the discovered wlan_id, policy_profile, parsed_ssid
      debug:
        msg:
          - "WLAN ID: {{ wlan_id }}"
          - "Policy Profile: {{ policy_profile }}"
          - "Parsed SSID: {{ parsed_SSID }}"

    - name: Debug the discovered wlan_id and policy_profile
      debug:
        msg:
          - "Discovered WLAN ID: {{ wlan_id }}"
          - "Discovered Policy Profile: {{ policy_profile }}"

    - name: Disable and update WLAN configuration
      cisco.ios.ios_config:
        # On 9800, the syntax is typically:
        # wlan <policy_profile> <wlan_id> <SSID>
        parents:
          - "wlan {{ policy_profile }} {{ wlan_id }} {{ ssid }}"
        lines:
          - "shutdown"
          # Example: removing certain security features
          - "no security wpa psk set-key ascii 0"
          - "no security web-auth parameter-map"
          - "no security ft over-the-air"
        save_when: modified

    - name: Manage mobility anchors
      cisco.ios.ios_config:
        with_items: "{{ mobility_anchors }}"
        parents:
          - "wlan {{ policy_profile }} {{ wlan_id }} {{ ssid }}"
        lines:
          - "mobility anchor {{ item.ip }} {{ item.action }}"
        save_when: modified

    - name: Re-enable the WLAN
      cisco.ios.ios_config:
        parents:
          - "wlan {{ policy_profile }} {{ wlan_id }} {{ ssid }}"
        lines:
          - "no shutdown"
        save_when: modified

    - name: Show WLAN details
      cisco.ios.ios_command:
        # Alternatively: "show wlan id {{ wlan_id }}" or "show wlan name {{ ssid }}"
        commands:
          - "show wlan name {{ ssid }}"
      register: wlan_details

    - name: Display WLAN details
      debug:
        var: wlan_details.stdout
