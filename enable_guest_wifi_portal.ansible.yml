---
- name: Manage WLAN on Cisco IOS XE WLC
  hosts: all
  gather_facts: false
  connection: network_cli

  vars_prompt:
    - name: "username"
      prompt: "Enter the SSH username"
    - name: "password"
      prompt: "Enter the SSH password"
      private: yes

  vars:
    ssid: "WHS_Guest"  # SSID to manage
    mobility_anchors:
      - { action: "delete", ip: "162.41.34.21" }
      - { action: "add",    ip: "162.41.34.23" }

  tasks:
    - name: Fetch WLAN summary
      cisco.ios.ios_command:
        commands:
          - "show wlan summary"
      register: wlan_summary_output

    - name: Extract WLAN ID for the SSID
      set_fact:
        wlan_id: >-
          {% for line in wlan_summary_output.stdout[0].split('\n') %}
          {% if ssid in line %}
          {{ line.split()[0] }}
          {% endif %}
          {% endfor %}

    - name: Fail if WLAN ID is not found
      fail:
        msg: "WLAN ID for SSID '{{ ssid }}' not found on {{ inventory_hostname }}."
      when: wlan_id is undefined

    - name: Perform WLAN configuration (disable, remove security, etc.)
      cisco.ios.ios_config:
        # Enter WLAN sub-mode on 9800 using "wlan <NAME> <ID> <SSID>".
        parents:
          - "wlan {{ ssid }} {{ wlan_id }} {{ ssid }}"
        lines:
          - "shutdown"                              # Equivalent to disabling the WLAN
          - "no security wpa psk set-key ascii 0"   # Example: remove WPA PSK
          - "no security ft over-the-air"           # Example: remove Fast Transition
          - "no security web-auth parameter-map"    # Example: remove WebAuth
          # Add or remove additional lines as needed, e.g.:
          # - "no security dot1x authentication-list <LIST_NAME>"
          # - "no security wpa psk set-key ascii 7 <ENCRYPTED_KEY>"
        save_when: modified

    - name: Manage mobility anchors
      cisco.ios.ios_config:
        with_items: "{{ mobility_anchors }}"
        parents:
          - "wlan {{ ssid }} {{ wlan_id }} {{ ssid }}"
        lines:
          # On 9800, you typically use "mobility anchor <IP> <add|delete>" in sub-mode
          - "mobility anchor {{ item.ip }} {{ item.action }}"
        save_when: modified

    - name: Enable WLAN
      cisco.ios.ios_config:
        parents:
          - "wlan {{ ssid }} {{ wlan_id }} {{ ssid }}"
        lines:
          - "no shutdown"     # Re-enable WLAN on 9800
        save_when: modified

    - name: Show WLAN details
      cisco.ios.ios_command:
        # On 9800, you can use either "show wlan id <ID>" or "show wlan name <NAME>"
        commands:
          - "show wlan name {{ ssid }}"
      register: wlan_details

    - name: Display WLAN details
      debug:
        var: wlan_details.stdout